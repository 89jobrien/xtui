name: CI

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,just

      - run: cargo install cargo-rail --locked 2>/dev/null || true

      - name: fmt
        run: cargo fmt --all --check

      - name: rail run
        run: cargo rail run --profile ci --merge-base

  promote:
    name: Promote develop → main
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo install cargo-rail --locked 2>/dev/null || true

      - name: Install nushell
        run: cargo install nu --locked 2>/dev/null || true

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Promote + patch bump
        run: nu scripts/ci-promote.nu --remote origin
