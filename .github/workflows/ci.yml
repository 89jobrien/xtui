name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: version label
        run: |
          MSG=$(git log -1 --format=%B)
          if ! echo "$MSG" | grep -qE '\(\+patch |\(\+minor |\(\+major '; then
            echo "Missing version label — commit must include (+patch x.y.z), (+minor x.y.z), or (+major x.y.z)"
            echo "Push via local hook to add the label automatically."
            exit 1
          fi

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest,just

      - name: test
        run: cargo nextest run --workspace
